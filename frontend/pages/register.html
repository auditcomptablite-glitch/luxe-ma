<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Inscription — LUXE.MA</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse 80% 60% at 70% 50%,rgba(201,168,76,0.05) 0%,transparent 70%);}
.auth-card{width:100%;max-width:480px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem;}
.auth-title{font-family:var(--font-display);font-size:1.8rem;text-align:center;margin-bottom:0.4rem;}
.auth-sub{text-align:center;color:var(--text2);font-size:0.85rem;margin-bottom:2rem;}
</style>
</head>
<body>
<div class="auth-wrap">
  <div class="auth-card">
    <div style="text-align:center;margin-bottom:2rem;"><a href="/" class="nav-logo">LUXE<span style="color:var(--gold)">.</span>MA</a></div>
    <h2 class="auth-title">Créer un compte</h2>
    <p class="auth-sub">Rejoignez-nous et profitez de nos offres exclusives</p>

    <div id="error-msg" style="display:none;background:rgba(224,85,85,0.1);border:1px solid rgba(224,85,85,0.2);border-radius:var(--radius);padding:0.8rem 1rem;margin-bottom:1.2rem;font-size:0.85rem;color:var(--red)"></div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Prénom & Nom *</label>
        <input class="form-control" id="name" placeholder="Votre nom complet" autofocus>
      </div>
      <div class="form-group">
        <label class="form-label">Téléphone</label>
        <input class="form-control" id="phone" placeholder="+212 6 XX XX XX XX">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Email *</label>
      <input class="form-control" id="email" type="email" placeholder="votre@email.com">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Mot de passe *</label>
        <input class="form-control" id="password" type="password" placeholder="Min. 6 caractères">
      </div>
      <div class="form-group">
        <label class="form-label">Confirmer *</label>
        <input class="form-control" id="confirm" type="password" placeholder="Répétez le mot de passe">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Adresse (optionnel)</label>
      <input class="form-control" id="address" placeholder="Adresse de livraison par défaut">
    </div>
    <div class="form-group">
      <label class="form-label">Ville (optionnel)</label>
      <input class="form-control" id="city" placeholder="Casablanca, Rabat...">
    </div>

    <button class="btn btn-gold btn-lg" style="width:100%;margin-top:0.5rem" id="reg-btn" onclick="doRegister()">
      Créer mon compte
    </button>

    <p style="text-align:center;font-size:0.85rem;color:var(--text3);margin-top:1.2rem">
      Déjà un compte ? <a href="/login" style="color:var(--gold)">Se connecter</a>
    </p>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/main.js"></script>
<script>
if (Auth.isLoggedIn()) window.location.href = '/';

async function doRegister() {
  const name = document.getElementById('name').value.trim();
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirm = document.getElementById('confirm').value;
  const errEl = document.getElementById('error-msg');
  const btn = document.getElementById('reg-btn');

  errEl.style.display = 'none';
  if (!name || !email || !password) { errEl.style.display='block'; errEl.textContent='Veuillez remplir les champs obligatoires.'; return; }
  if (password.length < 6) { errEl.style.display='block'; errEl.textContent='Le mot de passe doit comporter au moins 6 caractères.'; return; }
  if (password !== confirm) { errEl.style.display='block'; errEl.textContent='Les mots de passe ne correspondent pas.'; return; }

  btn.disabled = true; btn.textContent = 'Création...';
  try {
    const data = await apiCall('POST', '/auth/register', {
      name, email, password,
      phone: document.getElementById('phone').value.trim(),
      address: document.getElementById('address').value.trim(),
      city: document.getElementById('city').value.trim()
    });
    Auth.set(data.user, data.token);
    Toast.success('Compte créé avec succès !');
    setTimeout(() => window.location.href = '/', 800);
  } catch(e) {
    errEl.style.display='block'; errEl.textContent = e.message;
    btn.disabled=false; btn.textContent='Créer mon compte';
  }
}
</script>
</body>
</html>
