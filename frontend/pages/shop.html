<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Boutique — LUXE.MA</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.shop-layout { display: grid; grid-template-columns: 260px 1fr; gap: 2rem; align-items: start; }
.sidebar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 1.5rem; position: sticky; top: 90px;
}
.sidebar-title { font-size: 0.7rem; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
.filter-group { margin-bottom: 1.5rem; }
.filter-label { font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text2); margin-bottom: 0.8rem; display: block; }
.cat-filter-item {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0.5rem 0.7rem; border-radius: var(--radius);
  cursor: pointer; font-size: 0.85rem; color: var(--text2);
  transition: all var(--transition); border: 1px solid transparent;
}
.cat-filter-item:hover { color: var(--text); background: var(--bg3); }
.cat-filter-item.active { color: var(--gold); background: var(--gold-dim); border-color: rgba(201,168,76,0.2); }
.shop-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.5rem; flex-wrap: wrap; gap: 0.8rem; }
.shop-count { font-size: 0.85rem; color: var(--text2); }
.search-bar {
  display: flex; gap: 0.5rem; margin-bottom: 2rem;
}
.search-bar input { flex: 1; }
.pagination { display: flex; gap: 0.4rem; justify-content: center; margin-top: 2.5rem; flex-wrap: wrap; }
.page-btn {
  width: 36px; height: 36px; border-radius: var(--radius);
  background: var(--surface); border: 1px solid var(--border2);
  color: var(--text2); font-size: 0.82rem; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
}
.page-btn:hover, .page-btn.active { border-color: var(--gold); color: var(--gold); }

/* ── Stock badge on cards ── */
.stock-badge {
  display: inline-flex; align-items: center; gap: 0.3rem;
  font-size: 0.7rem; font-weight: 500; letter-spacing: 0.03em;
  padding: 0.22rem 0.55rem; border-radius: 2rem;
  margin-top: 0.45rem;
}
.stock-badge.in-stock {
  background: rgba(92,184,92,0.12); color: #5cb85c;
  border: 1px solid rgba(92,184,92,0.25);
}
.stock-badge.low-stock {
  background: rgba(201,168,76,0.12); color: var(--gold);
  border: 1px solid rgba(201,168,76,0.25);
}
.stock-badge.out-of-stock {
  background: rgba(224,85,85,0.12); color: var(--red);
  border: 1px solid rgba(224,85,85,0.25);
}
.stock-badge svg { flex-shrink: 0; }

/* Card out-of-stock state */
.product-card.out-of-stock { opacity: 0.7; }
.product-card.out-of-stock .product-card-img { filter: grayscale(40%); }

/* Tooltip on hover for stock detail */
.stock-tooltip-wrap { position: relative; display: inline-block; }

@media(max-width:900px){ .shop-layout{grid-template-columns:1fr;} .sidebar{position:static;} }
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">LUXE<span>.</span>MA</a>
    <div class="nav-links">
      <a href="/">Accueil</a>
      <a href="/shop" class="active">Boutique</a>
      <a href="/track">Suivre commande</a>
    </div>
    <div class="nav-actions">
      <a href="/cart" style="position:relative;display:inline-flex;color:inherit;">
        <button class="nav-icon-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span class="cart-badge" style="display:none">0</span></button>
      </a>
      <div id="nav-login" style="display:flex;align-items:center;gap:0.5rem;"><a href="/login" class="btn btn-outline btn-sm">Connexion</a></div>
      <div id="nav-user" style="display:none;align-items:center;gap:0.8rem;">
        <a href="/my-orders" class="btn btn-dark btn-sm">Mes commandes</a>
        <a href="/admin" class="btn btn-gold btn-sm nav-admin-link" style="display:none">Admin</a>
        <span class="nav-user-name" style="font-size:0.8rem;color:var(--text2)"></span>
      </div>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="/">Accueil</a><span>/</span><span>Boutique</span></div>
    <h2>Notre Collection</h2>
    <p style="color:var(--text2);margin-top:0.5rem">Des accessoires soigneusement sélectionnés pour votre style</p>
  </div>
</div>

<div class="container section" style="padding-top:2rem">
  <!-- Search -->
  <div class="search-bar">
    <input class="form-control" id="search-input" placeholder="Rechercher un produit..." type="text">
    <button class="btn btn-gold" onclick="applySearch()">Rechercher</button>
  </div>

  <div class="shop-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-title">Filtres</div>
      <div class="filter-group">
        <span class="filter-label">Catégories</span>
        <div id="cat-filters">
          <div class="cat-filter-item active" data-slug="" onclick="setCat('')">Tout</div>
        </div>
      </div>

      <!-- Stock filter -->
      <div class="filter-group">
        <span class="filter-label">Disponibilité</span>
        <div id="stock-filters">
          <div class="cat-filter-item active" data-stock="" onclick="setStockFilter('')">Tous les produits</div>
          <div class="cat-filter-item" data-stock="in" onclick="setStockFilter('in')">
            <span>En stock</span>
            <span style="width:8px;height:8px;border-radius:50%;background:#5cb85c;display:inline-block"></span>
          </div>
          <div class="cat-filter-item" data-stock="low" onclick="setStockFilter('low')">
            <span>Stock limité</span>
            <span style="width:8px;height:8px;border-radius:50%;background:var(--gold);display:inline-block"></span>
          </div>
        </div>
      </div>

      <button class="btn btn-dark btn-sm" style="width:100%" onclick="resetFilters()">Réinitialiser</button>
    </aside>

    <!-- Products -->
    <div>
      <div class="shop-header">
        <span class="shop-count" id="product-count">Chargement...</span>
        <select class="form-control" style="width:auto;padding:0.4rem 0.8rem" id="sort-select" onchange="loadProducts()">
          <option value="">Trier par défaut</option>
          <option value="price_asc">Prix croissant</option>
          <option value="price_desc">Prix décroissant</option>
          <option value="stock_desc">Stock décroissant</option>
        </select>
      </div>
      <div class="products-grid" id="products-grid">
        <div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div></div>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/main.js"></script>
<script>
let currentCat = '', currentPage = 1, currentStockFilter = '';

// Read URL params
const urlParams = new URLSearchParams(window.location.search);
if (urlParams.get('category')) currentCat = urlParams.get('category');

async function loadCategories() {
  const cats = await apiCall('GET', '/categories');
  const el = document.getElementById('cat-filters');
  el.innerHTML = `<div class="cat-filter-item ${!currentCat?'active':''}" data-slug="" onclick="setCat('')">Tout</div>` +
    cats.map(c => `<div class="cat-filter-item ${currentCat===c.slug?'active':''}" data-slug="${c.slug}" onclick="setCat('${c.slug}')">${c.name}</div>`).join('');
}

function setCat(slug) {
  currentCat = slug; currentPage = 1;
  document.querySelectorAll('#cat-filters .cat-filter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.slug === slug);
  });
  loadProducts();
}

function setStockFilter(val) {
  currentStockFilter = val; currentPage = 1;
  document.querySelectorAll('#stock-filters .cat-filter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.stock === val);
  });
  loadProducts();
}

function resetFilters() {
  currentCat = ''; currentPage = 1; currentStockFilter = '';
  document.getElementById('search-input').value = '';
  loadProducts(); loadCategories();
  document.querySelectorAll('#stock-filters .cat-filter-item').forEach(el => {
    el.classList.toggle('active', el.dataset.stock === '');
  });
}
function applySearch() { currentPage = 1; loadProducts(); }

document.getElementById('search-input').addEventListener('keydown', e => { if(e.key==='Enter') applySearch(); });

/* ── Stock badge HTML helper ── */
function stockBadge(stock) {
  if (stock <= 0) {
    return `<span class="stock-badge out-of-stock">
      <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
      Rupture de stock
    </span>`;
  }
  if (stock <= 5) {
    return `<span class="stock-badge low-stock">
      <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
      Plus que ${stock} en stock
    </span>`;
  }
  return `<span class="stock-badge in-stock">
    <svg width="9" height="9" viewBox="0 0 10 10" fill="currentColor"><circle cx="5" cy="5" r="5"/></svg>
    En stock (${stock} dispo.)
  </span>`;
}

async function loadProducts() {
  const grid = document.getElementById('products-grid');
  grid.innerHTML = '<div class="loading-center" style="grid-column:1/-1"><div class="spinner"></div></div>';
  const search = document.getElementById('search-input').value;
  const sort = document.getElementById('sort-select').value;
  let url = `/products?page=${currentPage}&limit=12`;
  if (currentCat) url += `&category=${currentCat}`;
  if (search) url += `&search=${encodeURIComponent(search)}`;

  try {
    let data = await apiCall('GET', url);

    // Client-side stock filter (data already includes stock from API)
    let products = data.products;
    if (currentStockFilter === 'in') products = products.filter(p => p.stock > 5);
    if (currentStockFilter === 'low') products = products.filter(p => p.stock > 0 && p.stock <= 5);

    // Client-side sort extension
    if (sort === 'stock_desc') products = [...products].sort((a,b) => b.stock - a.stock);

    document.getElementById('product-count').textContent = `${data.total} produit(s)`;

    if (!products.length) {
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-state-icon">🛍️</div><h3>Aucun produit trouvé</h3><p>Essayez d\'autres filtres</p></div>';
      return;
    }

    grid.innerHTML = products.map(p => `
      <div class="product-card${p.stock <= 0 ? ' out-of-stock' : ''}" onclick="window.location='/product/${p.slug}'">
        <img class="product-card-img" src="${p.image||'https://via.placeholder.com/400'}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/400'">
        <div class="product-card-body">
          <div class="product-card-cat">${p.category_name||''}</div>
          <div class="product-card-name">${p.name}</div>
          <div class="product-card-price">${parseFloat(p.price).toFixed(2)} MAD</div>
          ${stockBadge(p.stock)}
        </div>
        <div class="product-card-actions">
          ${p.stock > 0
            ? `<button class="btn btn-gold" style="width:100%" onclick="event.stopPropagation();Cart.add(${JSON.stringify(p).replace(/"/g,'&quot;')})">
                Ajouter au panier
              </button>`
            : `<button class="btn btn-dark" style="width:100%;opacity:0.5;cursor:not-allowed" disabled>
                Rupture de stock
              </button>`
          }
        </div>
      </div>
    `).join('');

    // Pagination
    const pg = document.getElementById('pagination');
    pg.innerHTML = '';
    for (let i = 1; i <= data.pages; i++) {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (i === currentPage ? ' active' : '');
      btn.textContent = i;
      btn.onclick = () => { currentPage = i; loadProducts(); window.scrollTo(0,0); };
      pg.appendChild(btn);
    }
  } catch(e) { grid.innerHTML = '<p style="color:var(--red);grid-column:1/-1;text-align:center">Erreur de chargement</p>'; }
}

loadCategories();
loadProducts();
</script>
</body>
</html>
