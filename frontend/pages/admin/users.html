<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Utilisateurs — Admin LUXE.MA</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar">
    <div class="sidebar-logo">LUXE<span style="color:var(--gold)">.</span>MA <span class="sidebar-tag">Administration</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Vue d'ensemble</div>
      <a href="/admin" class="sidebar-link"><span class="icon">📊</span> Tableau de bord</a>
      <div class="sidebar-section-label">Catalogue</div>
      <a href="/admin/products" class="sidebar-link"><span class="icon">🛍️</span> Produits</a>
      <a href="/admin/categories" class="sidebar-link"><span class="icon">🗂️</span> Catégories</a>
      <div class="sidebar-section-label">Commerce</div>
      <a href="/admin/orders" class="sidebar-link"><span class="icon">📦</span> Commandes</a>
      <a href="/admin/coupons" class="sidebar-link"><span class="icon">🎟️</span> Coupons</a>
      <div class="sidebar-section-label">Membres</div>
      <a href="/admin/users" class="sidebar-link active"><span class="icon">👥</span> Utilisateurs</a>
      <div class="sidebar-section-label">Site</div>
      <a href="/" target="_blank" class="sidebar-link"><span class="icon">🌐</span> Voir le site</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user-name"></div>
      <button class="btn btn-dark btn-sm" style="width:100%" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="admin-main">
    <div class="admin-topbar">
      <h1>Utilisateurs</h1>
      <div id="user-count" style="font-size:0.82rem;color:var(--text3)"></div>
    </div>
    <div class="admin-content">
      <div class="card">
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>Nom</th><th>Email</th><th>Téléphone</th><th>Ville</th><th>Rôle</th><th>Inscrit le</th></tr></thead>
            <tbody id="users-body">
              <tr><td colspan="6" style="text-align:center;padding:3rem"><div class="spinner" style="margin:0 auto"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/main.js"></script>
<script>
if (!Auth.isLoggedIn() || !Auth.isAdmin()) window.location.href = '/login';
document.getElementById('sidebar-user-name').textContent = Auth.get()?.name;

async function loadUsers() {
  try {
    const users = await apiCall('GET', '/admin/users');
    document.getElementById('user-count').textContent = `${users.length} utilisateur(s)`;
    document.getElementById('users-body').innerHTML = users.map(u => `
      <tr>
        <td style="color:var(--text)">${u.name}</td>
        <td style="font-size:0.82rem;color:var(--text2)">${u.email}</td>
        <td style="font-size:0.82rem;color:var(--text3)">${u.phone || '—'}</td>
        <td style="font-size:0.82rem;color:var(--text3)">${u.city || '—'}</td>
        <td>
          <span class="badge ${u.role === 'admin' ? 'badge-processing' : 'badge-confirmed'}">${u.role === 'admin' ? '⭐ Admin' : '👤 Client'}</span>
        </td>
        <td style="font-size:0.78rem;color:var(--text3)">${formatDate(u.created_at)}</td>
      </tr>
    `).join('');
  } catch(e) { Toast.error(e.message); }
}

loadUsers();
</script>
</body>
</html>
