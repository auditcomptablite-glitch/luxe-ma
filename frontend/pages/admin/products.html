<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Produits — Admin LUXE.MA</title>
<link rel="stylesheet" href="/css/style.css">
<link rel="stylesheet" href="/css/admin.css">
</head>
<body>
<div class="admin-layout">
  <div class="admin-sidebar">
    <div class="sidebar-logo">LUXE<span style="color:var(--gold)">.</span>MA <span class="sidebar-tag">Administration</span></div>
    <nav class="sidebar-nav">
      <div class="sidebar-section-label">Vue d'ensemble</div>
      <a href="/admin" class="sidebar-link"><span class="icon">📊</span> Tableau de bord</a>
      <div class="sidebar-section-label">Catalogue</div>
      <a href="/admin/products" class="sidebar-link active"><span class="icon">🛍️</span> Produits</a>
      <a href="/admin/categories" class="sidebar-link"><span class="icon">🗂️</span> Catégories</a>
      <div class="sidebar-section-label">Commerce</div>
      <a href="/admin/orders" class="sidebar-link"><span class="icon">📦</span> Commandes</a>
      <a href="/admin/coupons" class="sidebar-link"><span class="icon">🎟️</span> Coupons</a>
      <div class="sidebar-section-label">Membres</div>
      <a href="/admin/users" class="sidebar-link"><span class="icon">👥</span> Utilisateurs</a>
      <div class="sidebar-section-label">Site</div>
      <a href="/" target="_blank" class="sidebar-link"><span class="icon">🌐</span> Voir le site</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-user" id="sidebar-user-name"></div>
      <button class="btn btn-dark btn-sm" style="width:100%" onclick="logout()">Déconnexion</button>
    </div>
  </div>

  <div class="admin-main">
    <div class="admin-topbar">
      <h1>Gestion des produits</h1>
      <button class="btn btn-gold" onclick="openCreate()">+ Nouveau produit</button>
    </div>
    <div class="admin-content">
      <div class="toolbar">
        <div class="toolbar-left">
          <input class="form-control" id="search-p" placeholder="Rechercher..." style="width:220px" oninput="loadProducts()">
        </div>
        <div id="prod-count" style="font-size:0.82rem;color:var(--text3)"></div>
      </div>

      <div class="card">
        <div class="table-wrap">
          <table class="table">
            <thead><tr><th>Image</th><th>Nom</th><th>Catégorie</th><th>Prix</th><th>Stock</th><th>Vedette</th><th>Actif</th><th>Actions</th></tr></thead>
            <tbody id="products-body">
              <tr><td colspan="8" style="text-align:center;padding:3rem"><div class="spinner" style="margin:0 auto"></div></td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Product Modal -->
<div class="modal-overlay" id="product-modal">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modal-prod-title">Nouveau produit</span>
      <button class="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="prod-id">
      <div class="form-group">
        <label class="form-label">Nom du produit *</label>
        <input class="form-control" id="prod-name" placeholder="Nom du produit">
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea class="form-control" id="prod-desc" rows="3" placeholder="Description du produit..."></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Prix (MAD) *</label>
          <input class="form-control" id="prod-price" type="number" step="0.01" min="0" placeholder="0.00">
        </div>
        <div class="form-group">
          <label class="form-label">Stock</label>
          <input class="form-control" id="prod-stock" type="number" min="0" placeholder="0">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Catégorie</label>
        <select class="form-control" id="prod-cat">
          <option value="">Sans catégorie</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">URL image principale</label>
        <input class="form-control" id="prod-image" placeholder="https://...">
      </div>
      <div id="prod-image-preview" style="margin-top:0.5rem;display:none">
        <img id="preview-img" style="width:100%;max-height:180px;object-fit:cover;border-radius:var(--radius)">
      </div>
      <div style="display:flex;gap:1.5rem;margin-top:1rem">
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.85rem">
          <input type="checkbox" id="prod-featured"> Produit vedette
        </label>
        <label style="display:flex;align-items:center;gap:0.5rem;cursor:pointer;font-size:0.85rem" id="active-wrap">
          <input type="checkbox" id="prod-active" checked> Actif (visible)
        </label>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-dark" onclick="closeModal('product-modal')">Annuler</button>
      <button class="btn btn-gold" onclick="saveProduct()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/main.js"></script>
<script>
if (!Auth.isLoggedIn() || !Auth.isAdmin()) window.location.href = '/login';
document.getElementById('sidebar-user-name').textContent = Auth.get()?.name;

let categories = [];

async function init() {
  categories = await apiCall('GET', '/categories');
  const sel = document.getElementById('prod-cat');
  sel.innerHTML = '<option value="">Sans catégorie</option>' + categories.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
  loadProducts();
}

async function loadProducts() {
  const search = document.getElementById('search-p').value;
  const tbody = document.getElementById('products-body');
  try {
    const data = await apiCall('GET', `/products?limit=50${search?'&search='+encodeURIComponent(search):''}`);
    document.getElementById('prod-count').textContent = `${data.total} produit(s)`;

    // Admin needs all products including inactive — using a workaround by checking all
    const [allData] = await Promise.all([apiCall('GET', `/products?limit=200`)]);

    const products = search ? data.products : allData.products;

    tbody.innerHTML = products.map(p => `
      <tr>
        <td><img src="${p.image||'https://via.placeholder.com/42'}" onerror="this.src='https://via.placeholder.com/42'"></td>
        <td style="color:var(--text);font-weight:400">${p.name}</td>
        <td style="font-size:0.82rem;color:var(--text3)">${p.category_name||'—'}</td>
        <td style="color:var(--gold2)">${parseFloat(p.price).toFixed(2)} MAD</td>
        <td style="color:${p.stock<5?'var(--red)':p.stock<20?'var(--gold)':'var(--green)'}">${p.stock}</td>
        <td>
          <button
            class="btn btn-sm ${p.is_featured ? 'btn-gold' : 'btn-dark'}"
            style="font-size:0.8rem;padding:0.25rem 0.6rem"
            onclick="togglePopular(${p.id}, this)"
            title="${p.is_featured ? 'Retirer des populaires' : 'Marquer comme populaire'}"
          >${p.is_featured ? '⭐ Populaire' : '☆ Non populaire'}</button>
        </td>
        <td><span class="badge ${p.is_active?'badge-delivered':'badge-cancelled'}">${p.is_active?'Actif':'Inactif'}</span></td>
        <td style="display:flex;gap:0.5rem;padding:0.9rem 1rem">
          <button class="btn btn-dark btn-sm" onclick="openEdit(${JSON.stringify(p).replace(/"/g,'&quot;')})">Modifier</button>
          <button class="btn btn-danger btn-sm" onclick="deleteProduct(${p.id})">✕</button>
        </td>
      </tr>
    `).join('');
  } catch(e) { Toast.error(e.message); }
}

function openCreate() {
  document.getElementById('modal-prod-title').textContent = 'Nouveau produit';
  document.getElementById('prod-id').value = '';
  document.getElementById('prod-name').value = '';
  document.getElementById('prod-desc').value = '';
  document.getElementById('prod-price').value = '';
  document.getElementById('prod-stock').value = '0';
  document.getElementById('prod-cat').value = '';
  document.getElementById('prod-image').value = '';
  document.getElementById('prod-featured').checked = false;
  document.getElementById('prod-active').checked = true;
  document.getElementById('prod-image-preview').style.display = 'none';
  document.getElementById('active-wrap').style.display = 'none';
  openModal('product-modal');
}

function openEdit(p) {
  document.getElementById('modal-prod-title').textContent = 'Modifier le produit';
  document.getElementById('prod-id').value = p.id;
  document.getElementById('prod-name').value = p.name;
  document.getElementById('prod-desc').value = p.description || '';
  document.getElementById('prod-price').value = p.price;
  document.getElementById('prod-stock').value = p.stock;
  document.getElementById('prod-cat').value = p.category_id || '';
  document.getElementById('prod-image').value = p.image || '';
  document.getElementById('prod-featured').checked = !!p.is_featured;
  document.getElementById('prod-active').checked = !!p.is_active;
  document.getElementById('active-wrap').style.display = 'flex';
  if (p.image) {
    document.getElementById('prod-image-preview').style.display = 'block';
    document.getElementById('preview-img').src = p.image;
  }
  openModal('product-modal');
}

document.getElementById('prod-image').addEventListener('input', function() {
  const preview = document.getElementById('prod-image-preview');
  if (this.value) {
    preview.style.display = 'block';
    document.getElementById('preview-img').src = this.value;
  } else { preview.style.display = 'none'; }
});

async function saveProduct() {
  const id = document.getElementById('prod-id').value;
  const payload = {
    name: document.getElementById('prod-name').value.trim(),
    description: document.getElementById('prod-desc').value.trim(),
    price: parseFloat(document.getElementById('prod-price').value),
    stock: parseInt(document.getElementById('prod-stock').value),
    category_id: document.getElementById('prod-cat').value || null,
    image: document.getElementById('prod-image').value.trim(),
    is_featured: document.getElementById('prod-featured').checked,
    is_active: document.getElementById('prod-active').checked
  };
  if (!payload.name || !payload.price) { Toast.error('Nom et prix requis'); return; }
  try {
    if (id) await apiCall('PUT', `/products/${id}`, payload);
    else await apiCall('POST', '/products', payload);
    Toast.success(id ? 'Produit modifié' : 'Produit créé');
    closeModal('product-modal');
    loadProducts();
  } catch(e) { Toast.error(e.message); }
}

async function deleteProduct(id) {
  if (!confirm('Désactiver ce produit ?')) return;
  try {
    await apiCall('DELETE', `/products/${id}`);
    Toast.success('Produit désactivé');
    loadProducts();
  } catch(e) { Toast.error(e.message); }
}

async function togglePopular(id, btn) {
  try {
    const res = await apiCall('PATCH', `/products/${id}/popular`);
    const featured = res.is_featured;
    btn.className = `btn btn-sm ${featured ? 'btn-gold' : 'btn-dark'}`;
    btn.style = 'font-size:0.8rem;padding:0.25rem 0.6rem';
    btn.textContent = featured ? '⭐ Populaire' : '☆ Non populaire';
    btn.title = featured ? 'Retirer des populaires' : 'Marquer comme populaire';
    Toast.success(featured ? 'Ajouté aux produits populaires' : 'Retiré des produits populaires');
  } catch(e) { Toast.error(e.message); }
}

init();
</script>
</body>
</html>
