<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Mon Profil — LUXE.MA</title>
<link rel="stylesheet" href="/css/style.css">
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">LUXE<span>.</span>MA</a>
    <div class="nav-links"><a href="/">Accueil</a><a href="/shop">Boutique</a></div>
    <div class="nav-actions">
      <a href="/cart" style="position:relative;display:inline-flex;color:inherit;">
        <button class="nav-icon-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span class="cart-badge" style="display:none">0</span></button>
      </a>
      <div id="nav-user" style="display:flex;align-items:center;gap:0.8rem;">
        <a href="/my-orders" class="btn btn-dark btn-sm">Mes commandes</a>
        <span class="nav-user-name" style="font-size:0.8rem;color:var(--text2)"></span>
        <button class="btn btn-dark btn-sm" onclick="logout()">Déconnexion</button>
      </div>
      <div id="nav-login" style="display:none;"><a href="/login" class="btn btn-outline btn-sm">Connexion</a></div>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h2>Mon Profil</h2>
  </div>
</div>

<div class="container section" style="padding-top:2rem;max-width:600px">
  <div class="card" style="padding:2rem">
    <h3 style="font-family:var(--font-display);margin-bottom:1.5rem">Mes informations</h3>
    <div id="success-msg" style="display:none;background:rgba(92,184,92,0.1);border:1px solid rgba(92,184,92,0.2);border-radius:var(--radius);padding:0.8rem 1rem;margin-bottom:1.2rem;font-size:0.85rem;color:var(--green)">✓ Profil mis à jour avec succès</div>

    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Nom complet</label>
        <input class="form-control" id="name" placeholder="Votre nom">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" id="email" disabled style="opacity:0.5;cursor:not-allowed">
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Téléphone</label>
      <input class="form-control" id="phone" placeholder="+212 6 XX XX XX XX">
    </div>
    <div class="form-group">
      <label class="form-label">Adresse par défaut</label>
      <input class="form-control" id="address" placeholder="Adresse de livraison">
    </div>
    <div class="form-group">
      <label class="form-label">Ville</label>
      <input class="form-control" id="city" placeholder="Casablanca, Rabat...">
    </div>
    <div style="display:flex;gap:1rem;margin-top:0.5rem">
      <button class="btn btn-gold" onclick="save()">Enregistrer les modifications</button>
      <a href="/my-orders" class="btn btn-dark">Mes commandes</a>
    </div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/main.js"></script>
<script>
if (!Auth.isLoggedIn()) window.location.href = '/login?redirect=/profile';

async function load() {
  try {
    const u = await apiCall('GET', '/auth/me');
    document.getElementById('name').value = u.name || '';
    document.getElementById('email').value = u.email || '';
    document.getElementById('phone').value = u.phone || '';
    document.getElementById('address').value = u.address || '';
    document.getElementById('city').value = u.city || '';
  } catch { Toast.error('Erreur de chargement'); }
}

async function save() {
  try {
    await apiCall('PUT', '/auth/profile', {
      name: document.getElementById('name').value,
      phone: document.getElementById('phone').value,
      address: document.getElementById('address').value,
      city: document.getElementById('city').value
    });
    document.getElementById('success-msg').style.display = 'block';
    setTimeout(() => document.getElementById('success-msg').style.display = 'none', 3000);
  } catch(e) { Toast.error(e.message); }
}

load();
</script>
</body>
</html>
