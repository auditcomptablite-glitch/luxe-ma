<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Produit — LUXE.MA</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.product-detail { display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; padding: 4rem 0; align-items: start; }
.product-img-main { width:100%; aspect-ratio:1; object-fit:cover; border-radius:var(--radius); border:1px solid var(--border); }
.product-meta { padding-top: 1rem; }
.product-cat-tag { font-size:0.7rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); margin-bottom:0.8rem; }
.product-title { font-family:var(--font-display); font-size:clamp(1.8rem,3vw,2.8rem); font-weight:400; line-height:1.2; margin-bottom:1rem; }
.product-price { font-size:2rem; color:var(--gold2); font-weight:500; margin-bottom:1.5rem; }
.product-desc { color:var(--text2); line-height:1.8; margin-bottom:2rem; }
.qty-control { display:flex; align-items:center; gap:1rem; margin-bottom:1.5rem; }
.qty-btn { width:36px;height:36px;border-radius:var(--radius);background:var(--surface);border:1px solid var(--border2);color:var(--text);font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition); }
.qty-btn:hover{border-color:var(--gold);color:var(--gold);}
.qty-val { font-size:1.1rem; font-weight:500; min-width:2rem; text-align:center; }
.stock-info { font-size:0.8rem; color:var(--text3); margin-bottom:2rem; }
.stock-ok { color:var(--green); }
.stock-low { color:var(--gold); }
.stock-out { color:var(--red); }

/* Color selector */
.color-section { margin-bottom:1.8rem; }
.color-section-label { font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--text2); margin-bottom:0.8rem; display:flex; align-items:center; gap:0.6rem; }
.color-section-label span { color:var(--text); font-weight:500; font-size:0.82rem; letter-spacing:0; text-transform:none; }
.color-swatches { display:flex; flex-wrap:wrap; gap:0.55rem; }
.color-swatch {
  position:relative; width:34px; height:34px; border-radius:50%;
  cursor:pointer; border:2px solid transparent;
  transition:all 0.2s ease; flex-shrink:0;
}
.color-swatch:hover { transform:scale(1.12); }
.color-swatch.selected { border-color:var(--gold); box-shadow:0 0 0 2px var(--bg), 0 0 0 4px var(--gold); }
.color-swatch.out { opacity:0.3; cursor:not-allowed; }
.color-swatch .swatch-tooltip {
  position:absolute; bottom:calc(100% + 6px); left:50%; transform:translateX(-50%);
  background:var(--surface); border:1px solid var(--border2); color:var(--text);
  font-size:0.68rem; white-space:nowrap; padding:0.2rem 0.5rem; border-radius:3px;
  pointer-events:none; opacity:0; transition:opacity 0.15s; z-index:10;
}
.color-swatch:hover .swatch-tooltip { opacity:1; }

@media(max-width:800px){.product-detail{grid-template-columns:1fr;gap:2rem;}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">LUXE<span>.</span>MA</a>
    <div class="nav-links"><a href="/">Accueil</a><a href="/shop">Boutique</a><a href="/track">Suivre commande</a></div>
    <div class="nav-actions">
      <a href="/cart" style="position:relative;display:inline-flex;color:inherit;">
        <button class="nav-icon-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span class="cart-badge" style="display:none">0</span></button>
      </a>
      <div id="nav-login" style="display:flex;"><a href="/login" class="btn btn-outline btn-sm">Connexion</a></div>
      <div id="nav-user" style="display:none;align-items:center;gap:0.8rem;">
        <a href="/admin" class="btn btn-gold btn-sm nav-admin-link" style="display:none">Admin</a>
        <span class="nav-user-name" style="font-size:0.8rem;color:var(--text2)"></span>
      </div>
    </div>
  </div>
</nav>

<div class="container">
  <div id="product-detail">
    <div class="loading-center" style="min-height:60vh"><div class="spinner"></div></div>
  </div>
</div>

<div id="toast-container"></div>
<script src="/js/main.js"></script>
<script>
let product = null;
let qty = 1;
let selectedColor = null; // { id, name, hex, stock }

async function loadProduct() {
  const slug = window.location.pathname.split('/').pop();
  try {
    product = await apiCall('GET', `/products/${slug}`);
    render();
  } catch {
    document.getElementById('product-detail').innerHTML = `
      <div class="empty-state" style="min-height:60vh;display:flex;align-items:center;justify-content:center;flex-direction:column">
        <div class="empty-state-icon">😕</div>
        <h3>Produit introuvable</h3>
        <a href="/shop" class="btn btn-gold" style="margin-top:1rem">Retour à la boutique</a>
      </div>`;
  }
}

/* Effective stock = color stock if color selected, else global product stock */
function effectiveStock() {
  if (selectedColor) return selectedColor.stock;
  // If product has colors, sum of all colors stocks
  if (product.colors && product.colors.length) {
    return product.colors.reduce((s, c) => s + c.stock, 0);
  }
  return product.stock;
}

function stockDisplay(stock) {
  if (stock <= 0)  return { cls: 'stock-out', txt: '✕ Rupture de stock' };
  if (stock <= 5)  return { cls: 'stock-low', txt: `⚠ Stock limité (${stock} restants)` };
  return { cls: 'stock-ok', txt: `✓ En stock (${stock} disponibles)` };
}

function renderColorSection() {
  if (!product.colors || !product.colors.length) return '';
  const selectedLabel = selectedColor
    ? `<span>${selectedColor.name}</span>`
    : '<span style="color:var(--text3)">Non sélectionnée</span>';
  return `
    <div class="color-section">
      <div class="color-section-label">Couleur — ${selectedLabel}</div>
      <div class="color-swatches">
        ${product.colors.map(c => `
          <div class="color-swatch ${c.stock <= 0 ? 'out' : ''} ${selectedColor?.id === c.id ? 'selected' : ''}"
               style="background:${c.hex}"
               onclick="selectColor(${c.id})"
               title="${c.name}">
            <div class="swatch-tooltip">${c.name}${c.stock > 0 ? ` — ${c.stock} dispo.` : ' — Épuisé'}</div>
          </div>
        `).join('')}
      </div>
    </div>`;
}

function render() {
  const stock = effectiveStock();
  const { cls, txt } = stockDisplay(stock);
  qty = Math.min(qty, Math.max(1, stock));

  document.title = `${product.name} — LUXE.MA`;
  document.getElementById('product-detail').innerHTML = `
    <div class="product-detail">
      <div>
        <img class="product-img-main" src="${product.image||'https://via.placeholder.com/600'}" alt="${product.name}" onerror="this.src='https://via.placeholder.com/600'">
      </div>
      <div class="product-meta">
        <div class="breadcrumb" style="justify-content:flex-start;margin-bottom:1rem">
          <a href="/">Accueil</a><span>/</span><a href="/shop">Boutique</a><span>/</span><span>${product.name}</span>
        </div>
        <div class="product-cat-tag">${product.category_name||'Accessoire'}</div>
        <h1 class="product-title">${product.name}</h1>
        <div class="product-price">${parseFloat(product.price).toFixed(2)} MAD</div>
        <p class="product-desc">${product.description||''}</p>

        ${renderColorSection()}

        <div class="stock-info ${cls}" id="stock-info-line">${txt}</div>

        ${stock > 0 ? `
        <div class="qty-control">
          <button class="qty-btn" onclick="changeQty(-1)">−</button>
          <span class="qty-val" id="qty-display">${qty}</span>
          <button class="qty-btn" onclick="changeQty(1)">+</button>
          <span style="font-size:0.82rem;color:var(--text3)">quantité</span>
        </div>
        <div style="display:flex;gap:1rem;flex-wrap:wrap">
          <button class="btn btn-gold btn-lg" onclick="addProduct()" style="flex:1" id="add-btn">
            🛒 Ajouter au panier
          </button>
          <a href="/checkout" class="btn btn-outline btn-lg" onclick="addProduct()" style="flex:1">
            Commander maintenant
          </a>
        </div>` : `<button class="btn btn-dark btn-lg" disabled>Rupture de stock</button>`}

        <div style="margin-top:2rem;padding-top:2rem;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:0.6rem">
          <div style="font-size:0.82rem;color:var(--text3)">🚚 Livraison dans tout le Maroc</div>
          <div style="font-size:0.82rem;color:var(--text3)">💳 Paiement à la livraison</div>
          <div style="font-size:0.82rem;color:var(--text3)">↩️ Retours sous 7 jours</div>
        </div>
      </div>
    </div>
  `;
}

function selectColor(colorId) {
  const color = product.colors.find(c => c.id === colorId);
  if (!color || color.stock <= 0) return; // épuisé = non sélectionnable
  // Toggle off if already selected
  selectedColor = (selectedColor?.id === colorId) ? null : color;
  qty = 1;
  render();
}

function changeQty(delta) {
  const max = effectiveStock();
  qty = Math.max(1, Math.min(max, qty + delta));
  document.getElementById('qty-display').textContent = qty;
}

function addProduct() {
  const p = { ...product };
  if (selectedColor) {
    p.selectedColor = selectedColor.name;
    p.selectedColorHex = selectedColor.hex;
  }
  Cart.add(p, qty);
}

loadProduct();
</script>
</body>
</html>
