<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Panier — LUXE.MA</title>
<link rel="stylesheet" href="/css/style.css">
<style>
.cart-layout { display:grid;grid-template-columns:1fr 360px;gap:2rem;align-items:start; }
.cart-item {
  display:grid;grid-template-columns:80px 1fr auto;gap:1.2rem;align-items:center;
  padding:1.2rem;border-bottom:1px solid var(--border);
}
.cart-item-img{width:80px;height:80px;object-fit:cover;border-radius:var(--radius);}
.cart-item-name{font-family:var(--font-display);font-size:1.1rem;}
.cart-item-price{color:var(--text2);font-size:0.85rem;margin-top:0.3rem;}
.cart-qty{display:flex;align-items:center;gap:0.6rem;margin-top:0.6rem;}
.cart-qty-btn{width:28px;height:28px;border-radius:var(--radius);background:var(--bg3);border:1px solid var(--border2);color:var(--text);cursor:pointer;font-size:0.9rem;display:flex;align-items:center;justify-content:center;}
.cart-qty-btn:hover{border-color:var(--gold);color:var(--gold);}
.cart-item-total{font-weight:500;color:var(--gold2);font-size:1rem;white-space:nowrap;}
.remove-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:1.1rem;padding:0.2rem;transition:color var(--transition);}
.remove-btn:hover{color:var(--red);}
.summary-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:2rem;position:sticky;top:90px;}
.summary-row{display:flex;justify-content:space-between;margin-bottom:1rem;font-size:0.9rem;color:var(--text2);}
.summary-total{display:flex;justify-content:space-between;font-size:1.2rem;font-weight:500;color:var(--text);padding-top:1rem;border-top:1px solid var(--border);margin-top:1rem;margin-bottom:1.5rem;}
@media(max-width:900px){.cart-layout{grid-template-columns:1fr;}}
</style>
</head>
<body>
<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">LUXE<span>.</span>MA</a>
    <div class="nav-links"><a href="/">Accueil</a><a href="/shop">Boutique</a></div>
    <div class="nav-actions">
      <a href="/cart" style="position:relative;display:inline-flex;color:inherit;">
        <button class="nav-icon-btn"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg><span class="cart-badge" style="display:none">0</span></button>
      </a>
      <div id="nav-login" style="display:flex;"><a href="/login" class="btn btn-outline btn-sm">Connexion</a></div>
      <div id="nav-user" style="display:none;align-items:center;gap:0.8rem;">
        <a href="/admin" class="btn btn-gold btn-sm nav-admin-link" style="display:none">Admin</a>
        <span class="nav-user-name" style="font-size:0.8rem;color:var(--text2)"></span>
      </div>
    </div>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <div class="breadcrumb"><a href="/">Accueil</a><span>/</span><span>Panier</span></div>
    <h2>Mon Panier</h2>
  </div>
</div>

<div class="container section" style="padding-top:2rem">
  <div id="cart-wrap"></div>
</div>

<div id="toast-container"></div>
<script src="/js/main.js"></script>
<script>
function render() {
  const items = Cart.get();
  const wrap = document.getElementById('cart-wrap');

  if (!items.length) {
    wrap.innerHTML = `<div class="empty-state"><div class="empty-state-icon">🛍️</div><h3>Votre panier est vide</h3><p>Découvrez nos produits et ajoutez vos favoris</p><a href="/shop" class="btn btn-gold btn-lg">Explorer la boutique</a></div>`;
    return;
  }

  const subtotal = Cart.subtotal();

  wrap.innerHTML = `
    <div class="cart-layout">
      <div class="card">
        ${items.map(item => `
          <div class="cart-item">
            <img class="cart-item-img" src="${item.image||'https://via.placeholder.com/80'}" alt="${item.name}" onerror="this.src='https://via.placeholder.com/80'">
            <div>
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">${item.price.toFixed(2)} MAD / unité</div>
              <div class="cart-qty">
                <button class="cart-qty-btn" onclick="updateQty(${item.product_id}, ${item.quantity-1})">−</button>
                <span>${item.quantity}</span>
                <button class="cart-qty-btn" onclick="updateQty(${item.product_id}, ${item.quantity+1})">+</button>
              </div>
            </div>
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:0.5rem">
              <div class="cart-item-total">${(item.price*item.quantity).toFixed(2)} MAD</div>
              <button class="remove-btn" onclick="removeItem(${item.product_id})" title="Supprimer">✕</button>
            </div>
          </div>
        `).join('')}
        <div style="padding:1.2rem">
          <button class="btn btn-dark btn-sm" onclick="Cart.clear();render()">Vider le panier</button>
        </div>
      </div>

      <div class="summary-card">
        <h3 style="font-family:var(--font-display);margin-bottom:1.5rem">Récapitulatif</h3>
        <div class="summary-row"><span>${items.reduce((s,i)=>s+i.quantity,0)} article(s)</span><span>${subtotal.toFixed(2)} MAD</span></div>
        <div class="summary-row"><span>Livraison</span><span style="color:var(--green)">Gratuite</span></div>
        <div class="summary-row"><span>Paiement</span><span>À la livraison</span></div>
        <div class="summary-total">
          <span>Total</span>
          <span id="cart-total">${subtotal.toFixed(2)} MAD</span>
        </div>
        <a href="/checkout" class="btn btn-gold btn-lg" style="width:100%;margin-bottom:0.8rem">Commander</a>
        <a href="/shop" class="btn btn-dark" style="width:100%">Continuer les achats</a>
      </div>
    </div>
  `;
}

function updateQty(id, qty) { Cart.updateQty(id, qty); render(); }
function removeItem(id) { Cart.remove(id); render(); Toast.info('Article retiré'); }

render();
</script>
</body>
</html>
